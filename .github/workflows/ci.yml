name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: python -m twine check dist/*

  entire-sem:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: entire-sem

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: entire-sem/go.mod
          cache-dependency-path: entire-sem/go.sum
      - name: Run tests
        run: go test ./...
      - name: Build plugin binary
        run: go build -o /tmp/entire-sem ./cmd/entire-sem
